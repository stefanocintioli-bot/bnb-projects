name: Daily Intelligence Briefing

on:
  schedule:
    # 10:00 UTC = 7:00 AM Argentina time (UTC-3)
    - cron: '0 10 * * *'
  # Also allow manual trigger from the GitHub Actions UI (useful for testing)
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd daily-briefing-agent
          pip install -r requirements.txt

      - name: Run Daily Briefing Agent
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.BRIEFING_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd daily-briefing-agent
          python briefing_agent.py
